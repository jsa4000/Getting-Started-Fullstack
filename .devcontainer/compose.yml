include:
  - ../compose.yaml

services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
      #no_cache: true
    env_file:
      - path: ../.env
        required: false
    volumes:
      # Mount only the necessary files
      #- ../.devcontainer:/workspace/.devcontainer:ro
      #- ../.vscode:/workspace/.vscode:ro
      #- ../docs:/workspace/docs:ro
      # Optionally, you can mount the entire workspace if needed
      - ..:/workspace:cached
    command: sleep infinity
